devices:
  samplerate: 48000
  chunksize: 1024
  enable_rate_adjust: true
  target_level: 1024
  capture:
    type: Alsa
    channels: 2
    device: plughw:Loopback,1,0
    format: S16LE
  playback:
    type: Alsa
    channels: 2
    device: plughw:CARD=sndrpihifiberry,DEV=0
    format: S32LE

filters:
  preamp:
    type: Gain
    parameters:
      gain: -4.0
      inverted: false
      mute: false

  subsonic:
    type: Biquad
    parameters:
      type: Highpass
      freq: 28
      q: 0.707

  bass_warmth:
    type: Biquad
    parameters:
      type: Lowshelf
      freq: 110
      slope: 6
      gain: 1.5

  low_mid_cleanup:
    type: Biquad
    parameters:
      type: Peaking
      freq: 220
      q: 1.1
      gain: -1.0

  presence_smooth:
    type: Biquad
    parameters:
      type: Peaking
      freq: 2800
      q: 1.0
      gain: -1.5

  treble_air:
    type: Biquad
    parameters:
      type: Highshelf
      freq: 8500
      slope: 6
      gain: 2.0

mixers:
  mono:
    channels:
      in: 2
      out: 2
    mapping:
      - dest: 0
        sources:
          - channel: 0
            gain: -6
            inverted: false
          - channel: 1
            gain: -6
            inverted: false
      - dest: 1
        sources:
          - channel: 0
            gain: -6
            inverted: false
          - channel: 1
            gain: -6
            inverted: false

pipeline:
  - type: Mixer
    name: mono
  - type: Filter
    channel: 0
    names:
      - preamp
      - subsonic
      - bass_warmth
      - low_mid_cleanup
      - presence_smooth
      - treble_air
  - type: Filter
    channel: 1
    names:
      - preamp
      - subsonic
      - bass_warmth
      - low_mid_cleanup
      - presence_smooth
      - treble_air
