devices:
  samplerate: 48000
  chunksize: 1024
  enable_rate_adjust: true
  target_level: 1024
  capture:
    type: Alsa
    channels: 2
    device: plughw:Loopback,1,0
    format: S16LE
  playback:
    type: Alsa
    channels: 2
    device: plughw:CARD=sndrpihifiberry,DEV=0
    format: S32LE

# JSE Infinite Slope Model 1 - Recommended FIR EQ Profile (to be generated in rePhase):
# - 4.0 kHz Bell cut: -2.0 dB, Q 1.5 (Tame early tweeter glare)
# - 12.0 kHz High-Shelf: +1.5 dB (Restore top-end "air" for vintage tweeter)
# - 90 Hz Bell cut: -2.0 dB, Q 1.5 (Control typical cabinet/room mid-bass boom)
# - 35 Hz Low-Shelf: +2.0 dB (Extend deep-bass response)
# Note: Linear Phase FIR is recommended to preserve the original steep >100dB/octave crossover phase alignment.

filters:
  preamp:
    type: Gain
    parameters:
      gain: -4.0
      inverted: false
      mute: false

  fir_mono:
    type: Conv
    parameters:
      type: Wav
      filename: "/Users/johnny/code/camilladsp/coeffs/jse-model1-mono.wav"

mixers:
  mono_sum:
    channels:
      in: 2
      out: 2
    mapping:
      - dest: 0
        sources:
          - channel: 0
            gain: -6.0
            inverted: false
          - channel: 1
            gain: -6.0
            inverted: false
      - dest: 1
        sources:
          - channel: 0
            gain: -6.0
            inverted: false
          - channel: 1
            gain: -6.0
            inverted: false

pipeline:
  - type: Mixer
    name: mono_sum
  - type: Filter
    channel: 0
    names:
      - preamp
      - fir_mono
  - type: Filter
    channel: 1
    names:
      - preamp
      - fir_mono
