devices:
  samplerate: 48000
  chunksize: 1024
  enable_rate_adjust: true
  target_level: 1024
  capture:
    type: Alsa
    channels: 2
    device: plughw:Loopback,1,0
    format: S16LE
  playback:
    type: Alsa
    channels: 2
    device: plughw:CARD=sndrpihifiberry,DEV=0
    format: S32LE

filters:
  preamp:
    type: Gain
    parameters:
      gain: -4.5
      inverted: false
      mute: false

  subsonic:
    type: Biquad
    parameters:
      type: Highpass
      freq: 30
      q: 0.707

  bass_support:
    type: Biquad
    parameters:
      type: Lowshelf
      freq: 85
      slope: 6
      gain: 1.8

  lowmid_cleanup:
    type: Biquad
    parameters:
      type: Peaking
      freq: 260
      q: 1.0
      gain: -1.6

  presence_lift:
    type: Biquad
    parameters:
      type: Peaking
      freq: 2800
      q: 0.9
      gain: 1.0

  treble_air:
    type: Biquad
    parameters:
      type: Highshelf
      freq: 9000
      slope: 6
      gain: 1.4

mixers:
  stereo:
    channels:
      in: 2
      out: 2
    mapping:
      - dest: 0
        sources:
          - channel: 0
            gain: 0
            inverted: false
      - dest: 1
        sources:
          - channel: 1
            gain: 0
            inverted: false

pipeline:
  - type: Mixer
    name: stereo
  - type: Filter
    channel: 0
    names:
      - preamp
      - subsonic
      - bass_support
      - lowmid_cleanup
      - presence_lift
      - treble_air
  - type: Filter
    channel: 1
    names:
      - preamp
      - subsonic
      - bass_support
      - lowmid_cleanup
      - presence_lift
      - treble_air
